name: Publish Python distribution to PyPI

on:
  release:
    types: [published]

jobs:
  build:
    name: Build and verify distribution
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Build wheel and source distribution
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Test the built wheel
        run: |
          python -m pip install dist/*.whl
          cd "${RUNNER_TEMP}"
          python -c "from convertleica_file_browser.ci_leica_converters_helpers import read_leica_file; print(read_leica_file)"

      - name: Store distribution packages
        uses: actions/upload-artifact@v5
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish distribution to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/convertleica-file-browser
    permissions:
      id-token: write

    steps:
      - name: Download distribution packages
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

